version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casino_db
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://casino:casino123@db/casino_db
      SECRET_KEY: "CHANGE_THIS_SECRET_KEY_IN_PRODUCTION"
      BOT_TOKEN: "${BOT_TOKEN}"
      ADMIN_IDS: "${ADMIN_IDS}"
      REQUIRED_CHANNEL: "${REQUIRED_CHANNEL:-}"
      WEBAPP_URL: "${WEBAPP_URL}"
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend

  bot:
    build: ./bot
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      API_BASE: "http://backend:8000/api"
      WEBAPP_URL: "${WEBAPP_URL}"
      SECRET_KEY: "CHANGE_THIS_SECRET_KEY_IN_PRODUCTION"
      ADMIN_IDS: "${ADMIN_IDS}"
      REQUIRED_CHANNEL: "${REQUIRED_CHANNEL:-}"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/var/www/frontend
      - ./admin:/var/www/admin
      - ./ssl:/etc/ssl/certs
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
